name: Sync diario Intervals.icu

on:
  schedule:
    # 11:00 UTC = 5:00 AM Costa Rica (UTC-6). Garmin ya subió los datos de la noche.
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Sync diario (wellness + actividades, sin streams)
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: python sync_now.py --days 14 --no-streams

      - name: Sync con zonas FC (solo domingos)
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          if [ "$(date -u +%u)" = "7" ]; then
            echo "Domingo: descargando streams de FC..."
            python sync_now.py --days 30
          else
            echo "No es domingo, saltando streams."
          fi

      - name: Commit y push si hay cambios
        run: |
          git config user.name "vital-form-bot"
          git config user.email "actions@github.com"
          git add data/triathlon.db
          if git diff --cached --quiet; then
            echo "Sin cambios en la BD"
          else
            git commit -m "data: sync automatico $(date -u +%Y-%m-%d)"
            git push
          fi
